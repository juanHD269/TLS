<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gate - Proyectazo TLS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="background-overlay"></div>

<div class="container">
    <header>
        <div class="logo">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1>Secure Gate</h1>
        <p class="subtitle">Validación de Protocolo TLS 1.3</p>
    </header>
    
    <main>
        <div id="auth-section" class="card">
            <div class="input-group">
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Usuario" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
            </div>

            <div class="btn-group">
                <button id="btnLogin" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </div>
        </div>

        <div id="actions-section" class="card hidden">
            <div class="user-info">
                <span id="user-display">Bienvenido, <strong>Admin</strong></span>
                <button id="btnLogout" class="btn-text">Cerrar Sesión</button>
            </div>
            <button id="btnSecret" class="btn btn-accent">
                <i class="fas fa-vault"></i> Consultar Datos Secretos
            </button>
        </div>

        <div id="resultado-container" class="card">
            <div class="status-header">
                <span class="label">Respuesta del Servidor</span>
                <span id="status-badge" class="badge">Esperando...</span>
            </div>
            <div id="resultado" class="terminal-output">
                Inicie sesión para acceder al panel de administración.
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Proyectazo TLS • Nginx & Security Lab</p>
    </footer>
</div>

<script src="./script.js"></script>
</body>
</html>
